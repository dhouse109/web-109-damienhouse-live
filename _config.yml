# SEO and Analytics
bing_site_verification: "9051F0CC624447C20D0C9E68A85F1ABD"
google_site_verification: "WidaDdBoht9BRij-tvN80N5NWdg8-msXKWLFB3Wfb5U"
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-RL9VKKT7M9"
    anonymize_ip: false # default


# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-target-blank
  - jekyll-redirect-from
  - jekyll-seo-tag

target-blank:
   noopener: false
   noreferrer: false

